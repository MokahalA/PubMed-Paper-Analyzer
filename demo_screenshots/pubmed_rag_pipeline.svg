<svg width="680" height="384" viewBox="0 0 680 384" xmlns="http://www.w3.org/2000/svg" role="img">
<title>PubMed research paper analyzer pipeline</title>
<desc>Two flows: a data ingestion pipeline that fetches PubMed papers and stores them in SQLite and ChromaDB, and a question-answering flow that retrieves papers and generates an answer with the Gemma 3 LLM.</desc>
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
  .box { fill:#F4F3EE; stroke:#8B8A82; stroke-width:1; }
  .store { fill:#E1F5EE; stroke:#0F6E56; stroke-width:1; }
  .title { font-size:14px; font-weight:500; fill:#262624; }
  .subtitle { font-size:12px; fill:#5F5E5A; }
  .store-title { font-size:14px; font-weight:500; fill:#04342C; }
  .store-subtitle { font-size:12px; fill:#085041; }
  .header { font-size:15px; font-weight:600; fill:#262624; }
  .arrow-line { stroke:#8B8A82; stroke-width:1.5; fill:none; }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
  <path d="M2 1L8 5L2 9" fill="none" stroke="#8B8A82" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect x="0" y="0" width="680" height="384" fill="#FFFFFF"/>

<text class="header" x="340" y="40" text-anchor="middle">Data ingestion pipeline</text>

<rect class="box" x="40" y="60" width="130" height="44" rx="8"/>
<text class="title" x="105" y="82" text-anchor="middle" dominant-baseline="central">PubMed query</text>

<rect class="box" x="190" y="60" width="140" height="44" rx="8"/>
<text class="title" x="260" y="82" text-anchor="middle" dominant-baseline="central">Fetch &amp; parse</text>

<rect class="box" x="350" y="60" width="150" height="44" rx="8"/>
<text class="title" x="425" y="82" text-anchor="middle" dominant-baseline="central">Clean &amp; dedupe</text>

<rect class="box" x="520" y="60" width="115" height="44" rx="8"/>
<text class="title" x="577" y="82" text-anchor="middle" dominant-baseline="central">Store data</text>

<line x1="170" y1="82" x2="190" y2="82" class="arrow-line" marker-end="url(#arrow)"/>
<line x1="330" y1="82" x2="350" y2="82" class="arrow-line" marker-end="url(#arrow)"/>
<line x1="500" y1="82" x2="520" y2="82" class="arrow-line" marker-end="url(#arrow)"/>

<path d="M577 104 V140 H256 V180" class="arrow-line" marker-end="url(#arrow)"/>
<path d="M577 104 V140 H415 V180" class="arrow-line" marker-end="url(#arrow)"/>

<rect class="store" x="191" y="180" width="130" height="56" rx="10"/>
<text class="store-title" x="256" y="198" text-anchor="middle" dominant-baseline="central">SQLite</text>
<text class="store-subtitle" x="256" y="216" text-anchor="middle" dominant-baseline="central">Metadata</text>

<rect class="store" x="345" y="180" width="140" height="56" rx="10"/>
<text class="store-title" x="415" y="198" text-anchor="middle" dominant-baseline="central">ChromaDB</text>
<text class="store-subtitle" x="415" y="216" text-anchor="middle" dominant-baseline="central">Embeddings</text>

<text class="header" x="340" y="276" text-anchor="middle">Question answering (RAG)</text>

<rect class="box" x="40" y="300" width="130" height="44" rx="8"/>
<text class="title" x="105" y="322" text-anchor="middle" dominant-baseline="central">User question</text>

<rect class="box" x="184" y="300" width="155" height="44" rx="8"/>
<text class="title" x="261" y="322" text-anchor="middle" dominant-baseline="central">Retrieve papers</text>

<rect class="box" x="353" y="300" width="120" height="44" rx="8"/>
<text class="title" x="413" y="322" text-anchor="middle" dominant-baseline="central">Gemma 3 LLM</text>

<rect class="box" x="487" y="300" width="150" height="44" rx="8"/>
<text class="title" x="562" y="322" text-anchor="middle" dominant-baseline="central">Answer + sources</text>

<line x1="170" y1="322" x2="184" y2="322" class="arrow-line" marker-end="url(#arrow)"/>
<line x1="339" y1="322" x2="353" y2="322" class="arrow-line" marker-end="url(#arrow)"/>
<line x1="473" y1="322" x2="487" y2="322" class="arrow-line" marker-end="url(#arrow)"/>

</svg>
